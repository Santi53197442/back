spring.application.name=railway-spring-prototype

server.port=${PORT:8080}

#server.address=0.0.0.0
management.endpoints.web.exposure.include=health

# ======== CONFIGURACIÆN DE BASE DE DATOS (para Railway, usa variables de entorno) ========
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1

# ======== CONFIGURACIÆN JWT (para Railway, usa variables de entorno) ========
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=3600000

# ======== CONFIGURACIÆN DE CORREO ELECTRÆNICO (Usa variables de entorno) ========
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME} # No hay valor por defecto para el username
spring.mail.password=${MAIL_PASSWORD} # No hay valor por defecto para la contraseþa
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# ======== URL DE TU FRONTEND (Usa variable de entorno) ========
app.frontend.url=${FRONTEND_URL:https://frontend-eosin-eight-41.vercel.app}

debug=true